name: Sync OpenAPI Spec to Marketing Site

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'shared/**'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: sync-openapi
  cancel-in-progress: true

jobs:
  sync-openapi:
    name: Generate and push OpenAPI spec
    runs-on: ubuntu-latest

    steps:
      - name: Checkout core-int
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
          cache-dependency-path: backend/yarn.lock

      - name: Install and build shared library
        working-directory: shared
        run: yarn install --frozen-lockfile --non-interactive && yarn build

      - name: Install backend dependencies
        working-directory: backend
        run: yarn install --frozen-lockfile --non-interactive

      - name: Generate OpenAPI spec
        working-directory: backend
        env:
          KK_API_DOMAIN: api.krakenkey.io
          KK_API_VERSION: "0.1.0"
        run: yarn openapi:export

      - name: Push spec to web repo
        env:
          GH_PAT: ${{ secrets.WEB_REPO_PAT }}
        run: |
          git clone --depth 1 https://x-access-token:${GH_PAT}@github.com/KrakenKey/web.git /tmp/web
          cp backend/openapi.json /tmp/web/public/openapi.json
          cd /tmp/web
          if git diff --quiet public/openapi.json; then
            echo "No changes to OpenAPI spec. Skipping."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/openapi.json
          git commit -m "chore: sync OpenAPI spec from core-int@${GITHUB_SHA::7}"
          git push origin main
